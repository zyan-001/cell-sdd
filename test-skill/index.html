<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打砖块</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
  canvas { border: 2px solid #e94560; border-radius: 4px; display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="480" height="560"></canvas>
<script>
// === game Aggregate: 核心状态 ===
const CANVAS_W = 480;
const CANVAS_H = 560;
const BRICK_ROWS = 5;
const BRICK_COLS = 8;
const BRICK_W = 54;
const BRICK_H = 20;
const BRICK_PAD = 4;
const BRICK_TOP = 50;
const BRICK_LEFT = (CANVAS_W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
const PADDLE_W = 80;
const PADDLE_H = 12;
const PADDLE_SPEED = 7;
const PADDLE_Y = CANVAS_H - 40;
const BALL_R = 6;
const INITIAL_LIVES = 3;
const SPEED_UP_FACTOR = 1.2;

// 砖块类型颜色
const BRICK_COLORS = {
  normal:    { fill: '#e94560', stroke: '#c73e54' },
  'multi-hit': { fill: '#f5a623', stroke: '#d4901e', damaged: '#d4891a' },
  'speed-up':  { fill: '#00d2ff', stroke: '#00a8cc' }
};

let state = null; // game state

// 伪随机数生成器（固定种子，确保可复现）
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

const BRICK_SEED = 42;

// === start-game Action ===
function startGame() {
  const paddle = {
    x: (CANVAS_W - PADDLE_W) / 2,
    width: PADDLE_W,
    height: PADDLE_H,
    speed: PADDLE_SPEED
  };
  const ball = {
    x: CANVAS_W / 2,
    y: PADDLE_Y - BALL_R - 1,
    radius: BALL_R,
    dx: 0,
    dy: 0
  };
  // 生成砖块：伪随机分布 ~60% normal, ~25% multi-hit, ~15% speed-up
  const rand = seededRandom(BRICK_SEED);
  const bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const roll = rand();
      let type, hp;
      if (roll < 0.15) {
        type = 'speed-up'; hp = 1;
      } else if (roll < 0.40) {
        type = 'multi-hit'; hp = rand() < 0.5 ? 2 : 3;
      } else {
        type = 'normal'; hp = 1;
      }
      bricks.push({
        type,
        hp,
        maxHp: hp,
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        width: BRICK_W,
        height: BRICK_H,
        alive: true
      });
    }
  }
  state = {
    phase: 'idle',
    score: 0,
    lives: INITIAL_LIVES,
    paddle,
    ball,
    bricks,
    canvasWidth: CANVAS_W,
    canvasHeight: CANVAS_H
  };
}

// === move-paddle Action ===
const keys = { left: false, right: false };

function movePaddle() {
  if (state.phase !== 'playing') return;
  if (keys.left) {
    state.paddle.x = Math.max(0, state.paddle.x - state.paddle.speed);
  }
  if (keys.right) {
    state.paddle.x = Math.min(
      state.canvasWidth - state.paddle.width,
      state.paddle.x + state.paddle.speed
    );
  }
}

// === tick Action ===
function tick() {
  if (state.phase !== 'playing') return;

  const ball = state.ball;
  const paddle = state.paddle;

  // 1. 移动球
  ball.x += ball.dx;
  ball.y += ball.dy;

  // 2. 球与左右墙壁碰撞
  if (ball.x - ball.radius <= 0) {
    ball.x = ball.radius;
    ball.dx = Math.abs(ball.dx);
  }
  if (ball.x + ball.radius >= state.canvasWidth) {
    ball.x = state.canvasWidth - ball.radius;
    ball.dx = -Math.abs(ball.dx);
  }

  // 3. 球与顶部墙壁碰撞
  if (ball.y - ball.radius <= 0) {
    ball.y = ball.radius;
    ball.dy = Math.abs(ball.dy);
  }

  // 4. 球与挡板碰撞
  if (ball.dy > 0 &&
      ball.y + ball.radius >= PADDLE_Y &&
      ball.y + ball.radius <= PADDLE_Y + paddle.height + Math.abs(ball.dy) &&
      ball.x >= paddle.x &&
      ball.x <= paddle.x + paddle.width) {
    ball.dy = -Math.abs(ball.dy);
    // 根据碰撞点偏移调整 dx
    const hitPos = (ball.x - paddle.x) / paddle.width; // 0~1
    ball.dx = (hitPos - 0.5) * 8; // -4 ~ +4
    ball.y = PADDLE_Y - ball.radius;
  }

  // 5. 球与砖块碰撞
  for (const brick of state.bricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) {
      ball.dy = -ball.dy; // 反弹

      if (brick.type === 'normal') {
        brick.hp = 0;
        brick.alive = false;
        state.score += 10;
      } else if (brick.type === 'multi-hit') {
        brick.hp -= 1;
        if (brick.hp <= 0) {
          brick.alive = false;
          state.score += 10;
        } else {
          state.score += 5;
        }
      } else if (brick.type === 'speed-up') {
        brick.hp = 0;
        brick.alive = false;
        state.score += 10;
        // 加速球
        ball.dx *= SPEED_UP_FACTOR;
        ball.dy *= SPEED_UP_FACTOR;
      }
      break; // 每帧只处理一个砖块碰撞
    }
  }

  // 6. 球落底
  if (ball.y - ball.radius > state.canvasHeight) {
    state.lives -= 1;
    if (state.lives <= 0) {
      state.lives = 0;
      state.phase = 'lost';
    } else {
      resetBall();
    }
  }

  // 7. 判胜
  if (state.bricks.every(b => !b.alive)) {
    state.phase = 'won';
  }
}

function ballHitsBrick(ball, brick) {
  const closestX = Math.max(brick.x, Math.min(ball.x, brick.x + brick.width));
  const closestY = Math.max(brick.y, Math.min(ball.y, brick.y + brick.height));
  const dx = ball.x - closestX;
  const dy = ball.y - closestY;
  return (dx * dx + dy * dy) < (ball.radius * ball.radius);
}

function resetBall() {
  state.ball.x = state.paddle.x + state.paddle.width / 2;
  state.ball.y = PADDLE_Y - BALL_R - 1;
  state.ball.dx = 0;
  state.ball.dy = 0;
  state.phase = 'idle';
}

// === game-session Journey: 渲染与主循环 ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // 背景
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 砖块
  for (const brick of state.bricks) {
    if (!brick.alive) continue;
    const colors = BRICK_COLORS[brick.type];
    if (brick.type === 'multi-hit' && brick.hp < brick.maxHp) {
      ctx.fillStyle = colors.damaged;
    } else {
      ctx.fillStyle = colors.fill;
    }
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 3);
    ctx.fill();
    ctx.stroke();

    // 多击砖块显示剩余 hp
    if (brick.type === 'multi-hit' && brick.hp > 1) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(brick.hp, brick.x + brick.width / 2, brick.y + brick.height / 2);
    }
  }

  // 挡板
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.roundRect(state.paddle.x, PADDLE_Y, state.paddle.width, state.paddle.height, 4);
  ctx.fill();

  // 球
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(state.ball.x, state.ball.y, state.ball.radius, 0, Math.PI * 2);
  ctx.fill();

  // HUD
  ctx.fillStyle = '#eee';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`分数: ${state.score}`, 10, 24);
  ctx.textAlign = 'right';
  ctx.fillText(`生命: ${state.lives}`, CANVAS_W - 10, 24);

  // 阶段提示
  if (state.phase === 'idle') {
    drawCenterText('按 空格键 开始', CANVAS_H / 2 + 40);
  } else if (state.phase === 'won') {
    drawCenterText('恭喜通关！按 空格键 重新开始', CANVAS_H / 2 + 40);
  } else if (state.phase === 'lost') {
    drawCenterText('游戏结束！按 空格键 重新开始', CANVAS_H / 2 + 40);
  }
}

function drawCenterText(text, y) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, y - 20, CANVAS_W, 40);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, CANVAS_W / 2, y);
}

// === 键盘输入 ===
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'Left') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'Right') keys.right = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (state.phase === 'idle') {
      state.phase = 'playing';
      // 给球一个初始向上速度
      state.ball.dx = 3 * (Math.random() > 0.5 ? 1 : -1);
      state.ball.dy = -4;
    } else if (state.phase === 'won' || state.phase === 'lost') {
      startGame();
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'Left') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'Right') keys.right = false;
});

// === 主循环 ===
function gameLoop() {
  movePaddle();
  tick();
  render();
  requestAnimationFrame(gameLoop);
}

// 启动
startGame();
gameLoop();
</script>
</body>
</html>
